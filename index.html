<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <!-- Game Mode Selection -->
        <div id="modeSelection" class="mode-selection">
            <h2>Choose Game Mode</h2>
            <button id="twoPlayerBtn" class="mode-btn">Two Player</button>
            <button id="singlePlayerBtn" class="mode-btn">Single Player</button>
        </div>

        <!-- Player Names Input -->
        <div id="playerNames" class="player-names hidden">
            <input type="text" id="player1Name" placeholder="Player 1 (X)" maxlength="15">
            <input type="text" id="player2Name" placeholder="Player 2 (O)" maxlength="15">
            <button id="startGameBtn">Start Game</button>
        </div>

        <!-- Game Board -->
        <div id="gameContainer" class="game-container hidden">
            <div class="scoreboard">
                <div class="score">
                    <span id="player1NameDisplay">Player 1</span>: <span id="player1Score">0</span>
                </div>
                <div class="score">
                    <span id="player2NameDisplay">Player 2</span>: <span id="player2Score">0</span>
                </div>
                <div class="score">
                    Draws: <span id="drawScore">0</span>
                </div>
            </div>

            <div class="turn-indicator">
                <span id="turnDisplay">Player 1's Turn</span>
            </div>

            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="game-controls">
                <button id="restartBtn">Restart Round</button>
                <button id="resetBtn">Reset Game</button>
            </div>
        </div>

        <!-- Game Result Overlay -->
        <div id="resultOverlay" class="result-overlay hidden">
            <div class="result-content">
                <h2 id="resultText"></h2>
                <button id="nextRoundBtn">Next Round</button>
            </div>
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
